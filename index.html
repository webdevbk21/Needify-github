<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Needify - Order Now</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 1.5rem; }
        .options {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .option-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .option-btn.active {
            border-color: #007bff;
            color: #007bff;
            background-color: #e7f1ff;
        }
        form { display: none; text-align: left; }
        form.visible { display: block; }
        .field { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        textarea, input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        #message { margin-top: 1rem; font-size: 0.9rem; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Needify</h1>
        <p>What do you need today?</p>
        
        <div class="options">
            <button class="option-btn" onclick="selectOption('Xerox')">Xerox</button>
            <button class="option-btn" onclick="selectOption('Food')">Food</button>
        </div>

        <form id="orderForm" onsubmit="submitOrder(event)">
            <input type="hidden" id="orderType" name="type">
            
            <div class="field">
                <label id="detailsLabel" for="details">Details</label>
                <textarea id="details" name="details" rows="4" placeholder="Type what you need..." required></textarea>
            </div>

            <div class="field">
                <label for="contact">Contact Information</label>
                <input type="text" id="contact" name="contact" placeholder="Phone number or Name/Room" required>
            </div>

            <button type="submit">Submit Order</button>
            <div id="message"></div>
        </form>
    </div>

    <script>
        function selectOption(type) {
            document.getElementById('orderType').value = type;
            document.getElementById('orderForm').classList.add('visible');
            
            // Highlight active button
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === type);
            });

            // Update label based on selection
            const label = document.getElementById('detailsLabel');
            label.innerText = type === 'Xerox' ? 'Xerox Details (Pages, B&W/Color, etc.)' : 'Food Details (Item, Quantity, Canteen name)';
        }

        async function submitOrder(event) {
            event.preventDefault();
            const form = event.target;
            const messageDiv = document.getElementById('message');
            messageDiv.innerText = 'Submitting...';
            messageDiv.className = '';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    messageDiv.innerText = 'Order submitted successfully!';
                    messageDiv.className = 'success';
                    form.reset();
                    document.getElementById('orderForm').classList.remove('visible');
                    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
                } else {
                    const err = await response.text();
                    throw new Error(err);
                }
            } catch (error) {
                messageDiv.innerText = 'Error: ' + error.message;
                messageDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
